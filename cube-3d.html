<div id="debug-overlay-bottom" style="position:fixed;bottom:180px;left:0;width:100%;z-index:999;background:rgba(0,0,0,0.85);color:#0f0;font:12px monospace;padding:6px 8px;pointer-events:none;display:none;max-height:100px;overflow:hidden;"></div>

    <button onclick="window.scramble()" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;">🔀 Mix</button>

<div id="snapshot-bar" style="display:flex;justify-content:center;gap:4px;padding:0 12px 4px;position:fixed;bottom:74px;left:0;width:100%;z-index:800;box-sizing:border-box;">
  <button class="snap-slot" data-slot="0" onclick="window.loadSnapshot(0)" style="flex:0 0 auto;min-width:70px;padding:2px 6px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);cursor:pointer;font-size:9px;text-align:center;">📷 Slot 1<br><span id="snap-name-0" style="font-size:8px;color:rgba(255,255,255,0.3);">—</span></button>
  <button class="snap-slot" data-slot="1" onclick="window.loadSnapshot(1)" style="flex:0 0 auto;min-width:70px;padding:2px 6px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);cursor:pointer;font-size:9px;text-align:center;">📷 Slot 2<br><span id="snap-name-1" style="font-size:8px;color:rgba(255,255,255,0.3);">—</span></button>
  <button class="snap-slot" data-slot="2" onclick="window.loadSnapshot(2)" style="flex:0 0 auto;min-width:70px;padding:2px 6px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);cursor:pointer;font-size:9px;text-align:center;">📷 Slot 3<br><span id="snap-name-2" style="font-size:8px;color:rgba(255,255,255,0.3);">—</span></button>
</div>
<div id="cube-2d-container" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;overflow:hidden;"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
window.THREE = THREE;

// ==================== CUBE STATE ====================
const faceColors = [0xffffff, 0xffeb3b, 0x4caf50, 0x2196f3, 0xff9800, 0xf44336];

let state = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
let moves = 0;

function get(r, c, f) { return state[f * 9 + r * 3 + c]; }

function rotCW(f) {
  const o = f * 9;
  const s = [...state];
  state[o+0]=s[o+6]; state[o+1]=s[o+3]; state[o+2]=s[o+0];
  state[o+3]=s[o+7]; state[o+4]=s[o+4]; state[o+5]=s[o+1];
  state[o+6]=s[o+8]; state[o+7]=s[o+5]; state[o+8]=s[o+2];
}

function turnU() {
  rotCW(0); const s = [...state];
  state[45]=s[27]; state[46]=s[28]; state[47]=s[29];
  state[18]=s[45]; state[19]=s[46]; state[20]=s[47];
  state[36]=s[18]; state[37]=s[19]; state[38]=s[20];
  state[27]=s[36]; state[28]=s[37]; state[29]=s[38];
}
function turnD() {
  rotCW(1); const s = [...state];
  state[51]=s[24]; state[52]=s[25]; state[53]=s[26];
  state[33]=s[51]; state[34]=s[52]; state[35]=s[53];
  state[42]=s[33]; state[43]=s[34]; state[44]=s[35];
  state[24]=s[42]; state[25]=s[43]; state[26]=s[44];
}
function turnF() {
  rotCW(2); const s = [...state];
  state[45]=s[6];  state[48]=s[7];  state[51]=s[8];
  state[9]=s[51];  state[10]=s[48]; state[11]=s[45];
  state[38]=s[9];  state[41]=s[10]; state[44]=s[11];
  state[6]=s[38];  state[7]=s[41];  state[8]=s[44];
}
function turnB() {
  rotCW(3); const s = [...state];
  // B CW at z=-1: U_row0 → L_col0 → D_row2 → R_col2 → U_row0
  // U row0 (r: z+1→0) = state[0,1,2],  L col0 (c: z+1→0) = state[36,39,42]
  // D row2 (r: 1-z→2) = state[15,16,17], R col2 (c: 1-z→2) = state[47,50,53]
  // All 4 swaps reversed because adjacent axes are perpendicular
  state[42]=s[0]; state[39]=s[1]; state[36]=s[2];
  state[17]=s[36]; state[16]=s[39]; state[15]=s[42];
  state[53]=s[15]; state[50]=s[16]; state[47]=s[17];
  state[2]=s[47];  state[1]=s[50];  state[0]=s[53];
}
function turnL() {
  rotCW(4); const s = [...state];
  state[18]=s[0];  state[21]=s[3];  state[24]=s[6];
  state[9]=s[18];  state[12]=s[21]; state[15]=s[24];
  state[35]=s[9];  state[32]=s[12]; state[29]=s[15];
  state[0]=s[35];  state[3]=s[32];  state[6]=s[29];
}
function turnR() {
  rotCW(5); const s = [...state];
  state[2]=s[20];  state[5]=s[23];  state[8]=s[26];
  state[33]=s[2];  state[30]=s[5];  state[27]=s[8];
  state[11]=s[27]; state[14]=s[30]; state[17]=s[33];
  state[20]=s[11]; state[23]=s[14]; state[26]=s[17];
}

const turnFns = {U:turnU, D:turnD, F:turnF, B:turnB, L:turnL, R:turnR, ECW:turnECW, ECCW:turnECCW, MCW:turnMCW, MCCW:turnMCCW};
// E CW (from +Y view): F row1 → L row1 reversed → B row1 → R row1 → F row1
function turnECW() {
  const s = [...state];
  state[41]=s[21]; state[40]=s[22]; state[39]=s[23];
  state[32]=s[39]; state[31]=s[40]; state[30]=s[41];
  state[48]=s[30]; state[49]=s[31]; state[50]=s[32];
  state[21]=s[48]; state[22]=s[49]; state[23]=s[50];
}
function turnECCW() {
  const s = [...state];
  state[21]=s[41]; state[22]=s[40]; state[23]=s[39];
  state[39]=s[32]; state[40]=s[31]; state[41]=s[30];
  state[30]=s[48]; state[31]=s[49]; state[32]=s[50];
  state[48]=s[21]; state[49]=s[22]; state[50]=s[23];
}
// M CW (from +R view): F col1 → D col1 → B col1 reversed → U col1 → F col1
function turnMCW() {
  const s = [...state];
  state[25]=s[1];  state[22]=s[4];  state[19]=s[7];
  state[34]=s[10]; state[31]=s[13]; state[28]=s[16];
  state[10]=s[19]; state[13]=s[22]; state[16]=s[25];
  state[1]=s[28];  state[4]=s[31];  state[7]=s[34];
}
function turnMCCW() {
  const s = [...state];
  state[1]=s[25];  state[4]=s[22];  state[7]=s[19];
  state[10]=s[34]; state[13]=s[31]; state[16]=s[28];
  state[19]=s[10]; state[22]=s[13]; state[25]=s[16];
  state[28]=s[1];  state[31]=s[4];  state[34]=s[7];
}
// S CCW (from +Z view): inverse of CW permutation
function turnSCCW() {
  const s = [...state];
  // Inverse: where does each sticker's current value go back to?
  // new[37]=old[3]  → state[3]=s[37]  (U10 = current L10)
  // new[14]=old[37] → state[37]=s[14] (L10 = current D12)
  // new[52]=old[14] → state[14]=s[52] (D12 = current R21)
  // new[5]=old[52]  → state[52]=s[5]  (R21 = current U12)
  // new[43]=old[5]  → state[5]=s[43]  (U12 = current L12)
  // new[12]=old[43] → state[43]=s[12] (L12 = current D10)
  // new[46]=old[12] → state[12]=s[46] (D10 = current R01)
  // new[3]=old[46]  → state[46]=s[3]  (R01 = current U10)
  state[3]=s[37]; state[37]=s[14]; state[14]=s[52]; state[52]=s[5];
  state[5]=s[43]; state[43]=s[12]; state[12]=s[46]; state[46]=s[3];
  // new[40]=old[4]  → state[4]=s[40]  (U11 = current L11)
  // new[13]=old[40] → state[40]=s[13] (L11 = current D11)
  // new[49]=old[13] → state[13]=s[49] (D11 = current R11)
  // new[4]=old[49]  → state[49]=s[4]  (R11 = current U11)
  state[4]=s[40]; state[40]=s[13]; state[13]=s[49]; state[49]=s[4];
}
// S CW (from +Z view): U r1 → L c1 → D r1 → R c1 → U r1
function turnSCW() {
  const s = [...state];
  state[37]=s[3];  state[40]=s[4];  state[43]=s[5];
  state[14]=s[37]; state[13]=s[40]; state[12]=s[43];
  state[46]=s[12]; state[49]=s[13]; state[52]=s[14];
  state[5]=s[52];  state[4]=s[49];  state[3]=s[46];
}

function doMove(move) {
  const m = move.toUpperCase().replace("'","");
  const prime = move.includes("'");
  const n = prime ? 3 : 1;
  // Slice moves have explicit CW/CCW functions
  if (m === 'E') { prime ? turnECCW() : turnECW(); buildCube(); updateButtonSnapTargets(); return; }
  if (m === 'M') { prime ? turnMCCW() : turnMCW(); buildCube(); updateButtonSnapTargets(); return; }
  if (m === 'S') { prime ? turnSCCW() : turnSCW(); buildCube(); updateButtonSnapTargets(); return; }
  const fn = turnFns[m];
  if (!fn) return;
  for (let i = 0; i < n; i++) fn();
}

// ==================== THREE.JS SETUP ====================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(6, 4, 7);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(5, 8, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 512;
keyLight.shadow.mapSize.height = 512;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
fillLight.position.set(-3, 0, -5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
rimLight.position.set(0, -4, 0);
scene.add(rimLight);

// ==================== BUILD CUBE ====================
const faceNames = ['U','D','F','B','L','R'];
const cubieSize = 0.7;
const gap = 0.78;
const faceGeo = new THREE.BoxGeometry(cubieSize, cubieSize, 0.04);
const coreMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });

const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

const stickerMeshes = [];
const cubieCores = [];

// Save the solved state once so reset goes back to start colors, not default pattern
let solvedState = [];

function buildCube() {
  while(cubeGroup.children.length) cubeGroup.remove(cubeGroup.children[0]);
  stickerMeshes.length = 0;
  cubieCores.length = 0;
  
  for (let x = -1; x <= 1; x++) {
    for (let y = -1; y <= 1; y++) {
      for (let z = -1; z <= 1; z++) {
        const cubie = new THREE.Group();
        cubie.position.set(x * gap, y * gap, z * gap);
        
        // Core
        const core = new THREE.Mesh(new THREE.BoxGeometry(cubieSize, cubieSize, cubieSize), coreMat);
        core.castShadow = true;
        core.userData = { isCore: true };
        cubie.add(core);
        cubieCores.push(core);
        
        const facelets = {
          'px': { f: 5, r: 1-y, c: 1-z, dir: [ 1, 0, 0], ext: x === 1 },
          'nx': { f: 4, r: 1-y, c: z+1, dir: [-1, 0, 0], ext: x === -1 },
          'py': { f: 0, r: z+1, c: x+1, dir: [ 0, 1, 0], ext: y === 1 },
          'ny': { f: 1, r: 1-z, c: x+1, dir: [ 0,-1, 0], ext: y === -1 },
          'pz': { f: 2, r: 1-y, c: x+1, dir: [ 0, 0, 1], ext: z === 1 },
          'nz': { f: 3, r: 1-y, c: 1-x, dir: [ 0, 0,-1], ext: z === -1 },
        };
        
        for (const [dir, fl] of Object.entries(facelets)) {
          const ci = get(fl.r, fl.c, fl.f);
          const sticker = new THREE.Mesh(faceGeo, new THREE.MeshStandardMaterial({
            color: fl.ext ? faceColors[ci] : 0x111111,
            roughness: fl.ext ? 0.3 : 0.9,
            metalness: fl.ext ? 0.05 : 0,
          }));
          
          const [dx, dy, dz] = fl.dir;
          const halfSize = cubieSize / 2 + 0.015;
          sticker.position.set(dx * halfSize, dy * halfSize, dz * halfSize);
          
          if (dx === 1) sticker.rotation.y = Math.PI / 2;
          else if (dx === -1) sticker.rotation.y = -Math.PI / 2;
          else if (dy === 1) sticker.rotation.x = -Math.PI / 2;
          else if (dy === -1) sticker.rotation.x = Math.PI / 2;
          else if (dz === -1) sticker.rotation.y = Math.PI;
          
          sticker.castShadow = true;
          sticker.userData = { faceIdx: fl.f, row: fl.r, col: fl.c, isSticker: true, isExternal: fl.ext };
          cubie.add(sticker);
          if (fl.ext) stickerMeshes.push(sticker);

        }
        
        cubeGroup.add(cubie);
      }
    }
  }
  // Snapshot the solved colors after first build
  if (solvedState.length === 0) solvedState = [...state];
}
buildCube();

// ==================== ORBIT CONTROLS ====================
// Cube rotates around camera-relative axes: horizontal = camUp, vertical = camRight
// This gives a natural "rotate the view" feel no matter the cube's orientation
let orbitInverted = false;
renderer.domElement.style.touchAction = 'none';

let lastPointerPos = { x: 0, y: 0 };
let pointerDownPos = { x: 0, y: 0 };
let isDragging = false;
let swipeFace = null;
let swipeSticker = null;
let debugInfo = [];
let debugInfoBottom = [];
function debugLog(msg) {
  debugInfo.push(msg);
  const el = document.getElementById('debug-overlay');
  if (el && el.style.display !== 'none') el.innerHTML = debugInfo.slice(-5).join('<br>');
}
function debugLogBottom(msg) {
  debugInfoBottom.push(msg);
  const el = document.getElementById('debug-overlay-bottom');
  if (el && el.style.display !== 'none') el.innerHTML = debugInfoBottom.slice(-6).join('<br>');
}
let debugVisible = false; // { faceIdx, row, col }
let lastTapTime = 0;
let lastTapTimer = null;
let tapEnabled = true;
const SCALE = 0.012;
const SWIPE_THRESHOLD = 15; // pixels to trigger edge swipe

// Edge adjacency: which face is adjacent to each edge of each face
// FACE COORDINATE SYSTEMS (row col formulas):
//   F (face 2, +Z): r: 1-y, c: x+1  → row0=y=1=U, row2=y=-1=D, col0=x=-1=L, col2=x=1=R
//   B (face 3, -Z): r: 1-y, c: 1-x → row0=y=1=U, row2=y=-1=D, col0=x=1=R, col2=x=-1=L
//   U (face 0, +Y): r: z+1, c: x+1  → row0=z=-1=B, row2=z=1=F, col0=x=-1=L, col2=x=1=R
//   D (face 1, -Y): r: 1-z, c: x+1  → row0=z=1=F, row2=z=-1=B, col0=x=-1=L, col2=x=1=R
//   L (face 4, -X): r: 1-y, c: z+1  → row0=y=1=U, row2=y=-1=D, col0=z=-1=B, col2=z=1=F
//   R (face 5, +X): r: 1-y, c: 1-z  → row0=y=1=U, row2=y=-1=D, col0=z=1=F, col2=z=-1=B
// MIDDLE SLICE MAPPING:
//   row1 (mid-horizontal): F/B/L/R → E slice (y=0), U/D → S slice (z=0)
//   col1 (mid-vertical): F/B/U/D → M slice (x=0), L/R → S slice (z=0)
const edgeAdjacency = {
  // FACE F (2, +Z)
  2: {
    top: { face: 'U', isSlice: false },
    bottom: { face: 'D', isSlice: false },
    left: { face: 'L', isSlice: false },
    right: { face: 'R', isSlice: false },
    midLeft: { face: 'E', isSlice: true, startCell: [1, 0], dir: 'right' },
    midRight: { face: 'E', isSlice: true, startCell: [1, 2], dir: 'left' },
    midTop: { face: 'M', isSlice: true, startCell: [0, 1], dir: 'down' },
    midBottom: { face: 'M', isSlice: true, startCell: [2, 1], dir: 'up' },
  },
  // FACE B (3, -Z): B is at the back, physically mirrored vs F
  // col0=x=1=R side, col2=x=-1=L side — left col maps to R, right col maps to L
  // No invert needed — directions use the standard edge direction logic
  // midTop/midBottom M slice invert because B is opposite F — toward-center swipe on B gives opposite M turn than F
  3: {
    top: { face: 'U', isSlice: false },
    bottom: { face: 'D', isSlice: false },
    left: { face: 'R', isSlice: false },
    right: { face: 'L', isSlice: false },
    midLeft: { face: 'E', isSlice: true, startCell: [1, 0], dir: 'right' },
    midRight: { face: 'E', isSlice: true, startCell: [1, 2], dir: 'left' },
    midTop: { face: 'M', isSlice: true, startCell: [0, 1], dir: 'down', invert: true },
    midBottom: { face: 'M', isSlice: true, startCell: [2, 1], dir: 'up', invert: true },
  },
  // FACE U (0, +Y): row0=B, row2=F, col0=L, col2=R
  0: {
    top: { face: 'B', isSlice: false },
    bottom: { face: 'F', isSlice: false },
    left: { face: 'L', isSlice: false },
    right: { face: 'R', isSlice: false },
    midLeft: { face: 'S', isSlice: true, startCell: [1, 0], dir: 'right' },
    midRight: { face: 'S', isSlice: true, startCell: [1, 2], dir: 'left' },
    midTop: { face: 'M', isSlice: true, startCell: [0, 1], dir: 'down' },
    midBottom: { face: 'M', isSlice: true, startCell: [2, 1], dir: 'up' },
  },
  // FACE D (1, -Y): row0=F, row2=B, col0=L, col2=R
  // D face is bottom — "right" on screen maps to left in cube space, so midLeft/midRight dirs are swapped vs U
  1: {
    top: { face: 'F', isSlice: false },
    bottom: { face: 'B', isSlice: false },
    left: { face: 'L', isSlice: false },
    right: { face: 'R', isSlice: false },
    midLeft: { face: 'S', isSlice: true, startCell: [1, 0], dir: 'left' },
    midRight: { face: 'S', isSlice: true, startCell: [1, 2], dir: 'right' },
    midTop: { face: 'M', isSlice: true, startCell: [0, 1], dir: 'down' },
    midBottom: { face: 'M', isSlice: true, startCell: [2, 1], dir: 'up' },
  },
  // FACE L (4, -X): row0=U, row2=D, col0=B, col2=F
  4: {
    top: { face: 'U', isSlice: false },
    bottom: { face: 'D', isSlice: false },
    left: { face: 'B', isSlice: false },
    right: { face: 'F', isSlice: false },
    midLeft: { face: 'E', isSlice: true, startCell: [1, 0], dir: 'right' },
    midRight: { face: 'E', isSlice: true, startCell: [1, 2], dir: 'left' },
    midTop: { face: 'S', isSlice: true, startCell: [0, 1], dir: 'down' },
    midBottom: { face: 'S', isSlice: true, startCell: [2, 1], dir: 'up' },
  },
  // FACE R (5, +X): row0=U, row2=D, col0=F, col2=B
  5: {
    top: { face: 'U', isSlice: false },
    bottom: { face: 'D', isSlice: false },
    left: { face: 'F', isSlice: false },
    right: { face: 'B', isSlice: false },
    midLeft: { face: 'E', isSlice: true, startCell: [1, 0], dir: 'right' },
    midRight: { face: 'E', isSlice: true, startCell: [1, 2], dir: 'left' },
    midTop: { face: 'S', isSlice: true, startCell: [0, 1], dir: 'down', invert: true },
    midBottom: { face: 'S', isSlice: true, startCell: [2, 1], dir: 'up', invert: true },
  },
};

renderer.domElement.addEventListener('pointerdown', (e) => {
  lastPointerPos = { x: e.clientX, y: e.clientY };
  pointerDownPos = { x: e.clientX, y: e.clientY };
  isDragging = false;
  
  // Clear debug
  debugInfo = [];
  
  // Check if touch is on a face (tap mode) vs background (orbit mode)
  swipeFace = null;
  let touchNearCube = false;
  if (tapEnabled) {
    const rect = renderer.domElement.getBoundingClientRect();
    const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const ray = new THREE.Raycaster();
    const m = new THREE.Vector2(mx, my);
    ray.setFromCamera(m, camera);
    
    const stickerHits = ray.intersectObjects(stickerMeshes, false);
    
    if (stickerHits.length > 0) {
      const ud = stickerHits[0].object.userData;
      if (ud.isSticker) {
        swipeFace = faceNames[ud.faceIdx] || '';
        swipeSticker = { faceIdx: ud.faceIdx, row: ud.row, col: ud.col };
        debugLog(`HIT: ${faceNames[ud.faceIdx]}(${ud.row},${ud.col}) ext=${ud.isExternal}`);
      } else {
        swipeFace = {};
        debugLog('HIT: non-sticker mesh');
      }
    } else {
      const coreHits = ray.intersectObjects(cubieCores, false);
      swipeFace = coreHits.length > 0 ? {} : null;
      if (coreHits.length > 0) debugLog('HIT: core only');
      else debugLog('MISS: no hit');
    }
    
    // Also check if touch is near the cube's screen bounding box
    if (!swipeFace) {
      // Project cube's bounding sphere center to screen
      const cubePos = new THREE.Vector3(0, 0, 0);
      const cubeScreen = cubePos.clone().project(camera);
      // NDC → pixel
      const sx = (cubeScreen.x * 0.5 + 0.5) * rect.width;
      const sy = (-cubeScreen.y * 0.5 + 0.5) * rect.height;
      const pixelDist = Math.sqrt(
        (e.clientX - rect.left - sx) ** 2 +
        (e.clientY - rect.top - sy) ** 2
      );
      // Cube on screen is roughly 120-150px radius (from cubeGroup)
      // Use 200px as a generous capture zone
      touchNearCube = pixelDist < 130;
    }
  }
  
  if (touchNearCube && !swipeFace) {
    swipeFace = {}; // Mark as handled so orbit is suppressed
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (e.buttons !== 1) return;
  const dx = e.clientX - lastPointerPos.x;
  const dy = e.clientY - lastPointerPos.y;
  
  if (!isDragging) {
    // Dead zone: small movements near touch start don't orbit — breathing room
  if (Math.sqrt(dx*dx + dy*dy) < 10) return;
    isDragging = true;
  }
  
  // If touching a sticker, don't orbit (it's a tap/swipe)
  if (swipeFace) { lastPointerPos = { x: e.clientX, y: e.clientY }; return; }
  
  const inv = orbitInverted ? -1 : 1;
  
  // Camera-relative orbit: axes fixed in camera frame
  const worldUp = new THREE.Vector3(0, 1, 0);
  const camPos = new THREE.Vector3(6, 4, 7);
  const camForward = new THREE.Vector3().subVectors(new THREE.Vector3(0, 0, 0), camPos).normalize();
  const camRight = new THREE.Vector3().crossVectors(camForward, worldUp).normalize();
  const camUp = new THREE.Vector3().crossVectors(camRight, camForward).normalize();
  
  const angleH = dx * SCALE * inv;
  const angleV = dy * SCALE * inv;
  const qH = new THREE.Quaternion().setFromAxisAngle(camUp, angleH);
  const qV = new THREE.Quaternion().setFromAxisAngle(camRight, angleV);
  
  cubeGroup.quaternion.premultiply(qH);
  cubeGroup.quaternion.premultiply(qV);
  
  // Sync Euler
  cubeGroup.rotation.setFromQuaternion(cubeGroup.quaternion);
  
  lastPointerPos = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('pointerup', (e) => {
  if (swipeFace && typeof swipeFace === 'string') {
    const now = Date.now();
    const tappedFace = swipeFace;
    const dx = e.clientX - pointerDownPos.x;
    const dy = e.clientY - pointerDownPos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    // Check if this is a edge swipe (edge sticker + significant movement)
    if (swipeSticker && dist > SWIPE_THRESHOLD) {
      const { faceIdx, row, col } = swipeSticker;
      const adj = edgeAdjacency[faceIdx];
      if (adj) {
        let edgeEntry = null;
        let edgeName = null;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        const isCorner = (row === 0 || row === 2) && (col === 0 || col === 2);
        const dirLabel = absDx > absDy ? (dx > 0 ? 'RIGHT' : 'LEFT') : (dy > 0 ? 'DOWN' : 'UP');
        const isHoriz = absDx > absDy;
        debugLog(`SWIPE: ${faceNames[faceIdx]}(${row},${col}) ${dirLabel} dist=${dist.toFixed(0)}`);
        
        // === CLASSIFY CELL TYPE AND SWIPE DIRECTION ===
        
        // 1. CENTER (1,1): always tap, never swipe — handled below
        
        // 2. MID-ROW (1,0) or (1,2): horizontal swipes only
        if (row === 1 && col !== 1) {
          if (isHoriz) {
            // Horizontal swipe on middle row
            // col=0: RIGHT=toward-center(midLeft), LEFT=away(left)
            // col=2: LEFT=toward-center(midRight), RIGHT=away(right)
            if (col === 0) {
              if (dx > 0) { edgeEntry = adj.midLeft; edgeName = 'midLeft'; }
              else { edgeEntry = adj.left; edgeName = 'left'; }
            } else {
              if (dx < 0) { edgeEntry = adj.midRight; edgeName = 'midRight'; }
              else { edgeEntry = adj.right; edgeName = 'right'; }
            }
          } else {
            // Vertical swipe on middle row → cross-axis consumed
            edgeEntry = { consumed: true };
          }
        }
        
        // 3. MID-COL (0,1) or (2,1): vertical swipes only
        else if (col === 1 && row !== 1) {
          if (!isHoriz) {
            // Vertical swipe on middle column
            // row=0: DOWN=toward-center(midTop), UP=away(top)
            // row=2: UP=toward-center(midBottom), DOWN=away(bottom)
            if (row === 0) {
              if (dy > 0) { edgeEntry = adj.midTop; edgeName = 'midTop'; }
              else { edgeEntry = adj.top; edgeName = 'top'; }
            } else {
              if (dy < 0) { edgeEntry = adj.midBottom; edgeName = 'midBottom'; }
              else { edgeEntry = adj.bottom; edgeName = 'bottom'; }
            }
          } else {
            // Horizontal swipe on middle column → cross-axis consumed
            edgeEntry = { consumed: true };
          }
        }
        
        // 4. CORNER (0,0), (0,2), (2,0), (2,2): dominant axis determines edge
        else if (isCorner) {
          if (isHoriz) {
            edgeName = row === 0 ? 'top' : 'bottom';
          } else {
            edgeName = col === 0 ? 'left' : 'right';
          }
          edgeEntry = adj[edgeName];
        }
        
        // 5. EDGE BUT NOT MID: (0,1), (2,1), (1,0), (1,2) — already handled above by mid-row/mid-col
        // Edge non-corner/non-mid: only (0,1) away-from-center, (2,1) away-from-center fall through from mid-col
        else if (edgeEntry === null) {
          // Shouldn't reach here, but just in case
          edgeEntry = { consumed: true };
        }
        
        // === EXECUTE THE ACTION ===
        if (edgeEntry) {
          if (edgeEntry.consumed) { debugLog('→ CONSUMED'); isDragging = false; swipeFace = null; swipeSticker = null; return; }
          
          if (edgeName) debugLog(`→ ${edgeName} adj=${edgeEntry.face || '?'}`);
          
          const adjFace = edgeEntry.face;
          
          if (edgeEntry.isSlice) {
            // Slice move: use the face from adjacency data (E/M/S), dir encodes direction, invert reverses
            const sliceInv = edgeEntry.invert ? 1 : 0;
            const sliceFace = edgeEntry.face;
            if (edgeEntry.dir === 'right') { turnFace(sliceFace, 1 ^ sliceInv); debugLog(`→ SLICE: ${sliceFace} CCW`); }
            else if (edgeEntry.dir === 'left') { turnFace(sliceFace, 0 ^ sliceInv); debugLog(`→ SLICE: ${sliceFace} CW`); }
            else if (edgeEntry.dir === 'down') { turnFace(sliceFace, 0 ^ sliceInv); debugLog(`→ SLICE: ${sliceFace} CW`); }
            else if (edgeEntry.dir === 'up') { turnFace(sliceFace, 1 ^ sliceInv); debugLog(`→ SLICE: ${sliceFace} CCW`); }
          } else {
            // Face turn: direction determined by edge + swipe direction
            const inv = edgeEntry.invert ? 1 : 0;
            let prime = 0;
            
            if (edgeName === 'top') {
              // Horizontal swipe across top: RIGHT=CCW, LEFT=CW (standard)
              // Vertical swipe from top: DOWN=toward-center, UP=away (handled by mid-col)
              // For dominant-axis: horizontal uses dx, vertical uses dy
              prime = isHoriz
                ? (dx > 0 ? (inv ? 0 : 1) : (inv ? 1 : 0))
                : (dy > 0 ? (inv ? 1 : 0) : (inv ? 0 : 1));
            } else if (edgeName === 'bottom') {
              prime = isHoriz
                ? (dx > 0 ? (inv ? 1 : 0) : (inv ? 0 : 1))
                : (dy > 0 ? (inv ? 0 : 1) : (inv ? 1 : 0));
            } else if (edgeName === 'left') {
              prime = dy > 0 ? (inv ? 1 : 0) : (inv ? 0 : 1);
            } else { // 'right'
              prime = dy > 0 ? (inv ? 0 : 1) : (inv ? 1 : 0);
            }
            
            turnFace(adjFace, prime);
            debugLog('→ TURN ' + adjFace + (prime ? ' CCW' : ' CW'));
          }
          swipeSticker = null;
          isDragging = false;
          swipeFace = null;
          return;
        }
      }
    }
    
    // For faces with edge adjacency, only center sticker can trigger tap
    // Edge stickers on those faces must swipe, never tap
    if (swipeSticker && dist <= SWIPE_THRESHOLD) {
      const { faceIdx, row, col } = swipeSticker;
      const adj = edgeAdjacency[faceIdx];
      if (adj && (row !== 1 || col !== 1)) {
        // Edge sticker on a face with swipe mapping — no tap allowed
        isDragging = false; swipeFace = null; swipeSticker = null;
        return;
      }
    }
    
    // Center sticker (or face without edge mapping): tap behavior
    if (now - lastTapTime < 350) {
      clearTimeout(lastTapTimer);
      lastTapTime = 0;
      turnFace(tappedFace, 1); // double-tap → CCW
    } else {
      lastTapTime = now;
      if (lastTapTimer) clearTimeout(lastTapTimer);
      lastTapTimer = setTimeout(() => {
        if (lastTapTime !== 0) {
          turnFace(tappedFace, 0); // single tap → CW
          lastTapTime = 0;
          lastTapTimer = null;
        }
      }, 350);
    }
  }
  isDragging = false;
  swipeFace = null;
  swipeSticker = null;
});

// Center-sticker snap tracking: after slice moves, snap buttons follow center colors
const centerIndices = [4, 13, 22, 31, 40, 49]; // U,D,F,B,L,R face centers in state[]
const centerColorNames = ['U','D','F','B','L','R']; // color index 0=U(white), 1=D(yellow), 2=F(green), 3=B(blue), 4=L(orange), 5=R(red)

function updateButtonSnapTargets() {
  // Build map: which faceIdx currently has each center color?
  const colorToFace = {};
  for (let fi = 0; fi < 6; fi++) {
    const centerColor = state[centerIndices[fi]];
    colorToFace[centerColor] = fi;
  }
  
  // Update button onclick handlers
  for (let ci = 0; ci < 6; ci++) {
    const btnName = centerColorNames[ci]; // 'U','D','F','B','L','R'
    const targetFaceIdx = colorToFace[ci];
    const targetName = faceNames[targetFaceIdx];
    const btn = document.querySelector(`.b${btnName}`);
    if (btn) {
      // Set target as data attribute and use a shared click handler
      btn.dataset.snapTarget = targetName;
      btn.onclick = function() { window.snapToFace(this.dataset.snapTarget); };
    }
  }
}

// ==================== CONTROLS ====================
function turnFace(face, prime) {
  pushUndo();
  const move = prime ? face + "'" : face;
  const stateBefore = [...state];
  doMove(move);
  moves++;
  document.getElementById('moves').textContent = `Moves: ${moves}`;
  buildCube();
  
  // When debug is ON, log what changed: state diff + adjacent position analysis
  if (debugVisible) {
    const names = ['U','D','F','B','L','R'];
    const colors = ['W','Y','G','B','O','R'];
    // Find all changes
    const diffs = [];
    for (let i = 0; i < stateBefore.length; i++) {
      if (stateBefore[i] !== state[i]) {
        const f = Math.floor(i / 9);
        const r = Math.floor((i % 9) / 3);
        const c = i % 3;
        diffs.push({ idx: i, face: names[f], row: r, col: c, from: colors[stateBefore[i]], to: colors[state[i]] });
      }
    }
    // Build overlay content
    const lines = [];
    
    // Center sticker positions (read current state)
    const centerMap = [];
    for (let fi = 0; fi < 6; fi++) {
      const colorIdx = state[centerIndices[fi]];
      const colorAbbr = centerColorNames[colorIdx];
      centerMap.push(`${faceNames[fi]}=${colorAbbr}`);
    }
    lines.push(`Centers: ${centerMap.join(' ')}`);
    lines.push(`→ ${face}${prime?"'":""} turn — ${diffs.length} changes`);
    
    // For slice moves (E/M/S), show ALL diffs — they affect 4 adjacent faces
    // For face moves (U/D/F/B/L/R), show adjacent face diffs only
    const isSlice = 'EMS'.includes(face);
    if (isSlice) {
      const byFace = {};
      for (const d of diffs) {
        if (!byFace[d.face]) byFace[d.face] = [];
        byFace[d.face].push(d);
      }
      for (const [af, entries] of Object.entries(byFace)) {
        const rows = [...new Set(entries.map(e => e.row))];
        const cols = [...new Set(entries.map(e => e.col))];
        const pattern = rows.length === 1 ? `row${rows[0]}` : `col${cols[0]}`;
        const valStr = entries.sort((a,b) => a.row*3+a.col - b.row*3+b.col).map(e => `${e.from}→${e.to}`).join(' ');
        lines.push(`${af} ${pattern}: ${valStr}`);
      }
    } else {
      const fi = names.indexOf(face);
      if (fi >= 0) {
        const adjDiffs = diffs.filter(d => d.face !== face && d.face !== names[[1,0,3,2,5,4][fi]]);
        if (adjDiffs.length > 0) {
          const byFace = {};
          for (const d of adjDiffs) {
            if (!byFace[d.face]) byFace[d.face] = [];
            byFace[d.face].push(d);
          }
          for (const [af, entries] of Object.entries(byFace)) {
            const rows = [...new Set(entries.map(e => e.row))];
            const cols = [...new Set(entries.map(e => e.col))];
            const pattern = rows.length === 1 ? `row${rows[0]}` : `col${cols[0]}`;
            const valStr = entries.sort((a,b) => a.row*3+a.col - b.row*3+b.col).map(e => `${e.from}→${e.to}`).join(' ');
            lines.push(`${af} ${pattern}: ${valStr}`);
          }
        }
      }
    }
    
    // Render overlay — compact version: push lines to array, display once
    debugInfoBottom = lines;
    const el = document.getElementById('debug-overlay-bottom');
    if (el && el.style.display !== 'none') el.innerHTML = lines.slice(-6).join('<br>');
  }
  updateButtonSnapTargets();
  render2DCube();
}

// Snap cube face toward camera with correct orientation
// Uses quaternion two-step: align face normal to camera, then fix roll for anchor
// Anchor: U/D/F/B → orange (L) on left, L/R → white (U) on top
let snapFace = "none";
function snapToFace(face) {
  snapFace = face;
  const camDir = new THREE.Vector3(6, 4, 7).normalize();
  const camRight = new THREE.Vector3(0, 1, 0).cross(camDir).normalize();
  const camUp = new THREE.Vector3().crossVectors(camRight, camDir).normalize();

  // face_up directions for each face (which world direction should be "up" when viewing this face)
  const faceUp = {
    'U': new THREE.Vector3(0, 0, -1),  // green down, red right
    'D': new THREE.Vector3(0, 0, -1),  // green on top (from below)
    'F': new THREE.Vector3(0, 1, 0),  // white on top
    'B': new THREE.Vector3(0, 1, 0),  // white on top
    'L': new THREE.Vector3(0, 1, 0),  // white on top
    'R': new THREE.Vector3(0, 1, 0),  // white on top
  };
  
  const faceNormals = {
    'U': new THREE.Vector3(0, 1, 0),
    'D': new THREE.Vector3(0, -1, 0),
    'F': new THREE.Vector3(0, 0, 1),
    'B': new THREE.Vector3(0, 0, -1),
    'L': new THREE.Vector3(-1, 0, 0),
    'R': new THREE.Vector3(1, 0, 0),
  };
  
  // Step 1: rotate so face normal points toward camera
  const fn = faceNormals[face].clone();
  const q1 = new THREE.Quaternion().setFromUnitVectors(fn, camDir);
  
  // Step 2: fix roll so face's "up" aligns with screen's up (-camUp)
  const fu = faceUp[face].clone().applyQuaternion(q1);
  // Project fu onto the plane perpendicular to camDir
  const projLen = fu.dot(camDir);
  const proj = new THREE.Vector3().copy(fu).addScaledVector(camDir, -projLen);
  
  let q2;
  if (proj.length() < 0.001) {
    // Degenerate case: face-up is parallel to camDir
    // Use face-right instead (for U/D faces)
    const faceRight = {
      'U': new THREE.Vector3(1, 0, 0),  // red
      'D': new THREE.Vector3(-1, 0, 0), // red (from below)
    };
    const fr = faceRight[face].clone().applyQuaternion(q1);
    const projRight = new THREE.Vector3().copy(fr).addScaledVector(camDir, -fr.dot(camDir));
    q2 = new THREE.Quaternion().setFromUnitVectors(projRight.normalize(), camRight);
  } else {
    // Normal case: align projected face-up to screen-up (-camUp)
    const targetUp = camUp.clone().negate();
    q2 = new THREE.Quaternion().setFromUnitVectors(proj.normalize(), targetUp);
  }
  
  const finalQ = q2.clone().multiply(q1);
  
  // 180° spin for faces that need horizontal mirror correction
  if (face === 'D' || face === 'B') {
    const fn = faceNormals[face].clone().applyQuaternion(finalQ);
    const spin180 = new THREE.Quaternion().setFromAxisAngle(fn, Math.PI);
    cubeGroup.quaternion.copy(spin180.multiply(finalQ));
  } else {
    cubeGroup.quaternion.copy(finalQ);
  }
  cubeGroup.rotation.setFromQuaternion(cubeGroup.quaternion);
}

// World to screen projection for test helpers
window.worldToScreen = function(wx, wy, wz) {
  const vec = new window.THREE.Vector3(wx, wy, wz);
  vec.project(window.camera);
  const rect = window.renderer.domElement.getBoundingClientRect();
  return {
    x: (vec.x * 0.5 + 0.5) * rect.width + rect.left,
    y: (-vec.y * 0.5 + 0.5) * rect.height + rect.top
  };
};

// Reliable swipe simulation for automated testing
// Uses 3-step dispatch to ensure isDragging activates properly
window.simulateSwipe = function(x1, y1, x2, y2) {
  const el = window.renderer.domElement;
  const dx = x2 - x1, dy = y2 - y1;
  el.dispatchEvent(new PointerEvent('pointerdown', {
    clientX: x1, clientY: y1, bubbles: true, cancelable: true
  }));
  // Step 1: small move to cross 3px isDragging threshold
  el.dispatchEvent(new PointerEvent('pointermove', {
    clientX: x1 + dx * 0.0625, clientY: y1 + dy * 0.0625,
    buttons: 1, bubbles: true, cancelable: true
  }));
  // Step 2: mid move to cross SWIPE_THRESHOLD
  el.dispatchEvent(new PointerEvent('pointermove', {
    clientX: x1 + dx * 0.5, clientY: y1 + dy * 0.5,
    buttons: 1, bubbles: true, cancelable: true
  }));
  // Step 3: final move + release
  el.dispatchEvent(new PointerEvent('pointerup', {
    clientX: x2, clientY: y2, bubbles: true, cancelable: true
  }));
};

// ==================== SELF-TEST SUITE ====================
window.runFullTest = async function() {
  const faceNames = ['U','D','F','B','L','R'];
  const results = { pass: [], fail: [] };
  
  // Build reference diffs for all face/slice turns from an identity state
  const refs = {};
  const allMoves = ['U','D','F','B','L','R','E','M','S'];
  const identity = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
  for (const move of allMoves) {
    for (let p = 0; p < 2; p++) {
      window.setCubeState([...identity]);
      window.snapToFace('F');
      window.turnFace(move, p);
      const after = window.getCubeState();
      const diff = [];
      for (let i = 0; i < identity.length; i++) {
        if (identity[i] !== after[i]) diff.push(i);
      }
      refs[move + (p===0?'CW':'CCW')] = JSON.stringify(diff.sort((a,b) => a-b));
    }
  }
  window.setCubeState([...identity]);
  window.snapToFace('F');
  
  // Test each face separately
  for (const face of faceNames) {
    await new Promise(r => setTimeout(r, 30));
    
    const stickers = window.getStickerPositions().filter(s => s.face === face);
    const el = window.renderer.domElement;
    
    // For each non-center sticker
    for (const st of stickers) {
      const { row, col } = st;
      if (row === 1 && col === 1) continue;
      
      // Reset to solved state before EACH sticker test
      window.resetCube();
      window.snapToFace(face);
      await new Promise(r => setTimeout(r, 20));
      
      // Get fresh screen coords after reset
      const freshStickers = window.getStickerPositions().filter(s => s.face === face);
      const freshSt = freshStickers.find(s => s.row === row && s.col === col);
      if (!freshSt) continue;
      
      const screen = window.worldToScreen(...freshSt.worldPos);
      
      // Try all 4 directions, determine which would be "toward center"
      const dirs = [
        { dx: 0, dy: 1, name: 'down' },
        { dx: 0, dy: -1, name: 'up' },
        { dx: 1, dy: 0, name: 'right' },
        { dx: -1, dy: 0, name: 'left' },
      ];
      
      // Determine which directions should trigger for this cell type
      // This models the actual gesture logic to catch regressions
      const faceIdx = ['U','D','F','B','L','R'].indexOf(face);
      const isMidRow = row === 1 && col !== 1;
      const isMidCol = col === 1 && row !== 1;
      const isCorner = (row === 0 || row === 2) && (col === 0 || col === 2);
      const isLorR = faceIdx === 4 || faceIdx === 5;
      
      const expectedTrigger = {};
      for (const d of ['up','down','left','right']) expectedTrigger[d] = false;
      
      if (isCorner) {
        // Corners trigger on dominant axis — any direction is fine
        expectedTrigger.up = true; expectedTrigger.down = true;
        expectedTrigger.left = true; expectedTrigger.right = true;
      } else if (isMidRow) {
        // Middle row: horizontal triggers, vertical doesn't
        expectedTrigger.right = col === 0;
        expectedTrigger.left = col === 2;
      } else if (isMidCol && isLorR) {
        // L/R col=1: both up AND down trigger (top/bottom edge)
        expectedTrigger.up = true;
        expectedTrigger.down = true;
      } else if (isMidCol) {
        // Non-L/R col=1: single vertical direction triggers
        expectedTrigger.down = row === 0;
        expectedTrigger.up = row === 2;
      } else {
        // Edge cells (non-corner, non-mid)
        if (row === 0) expectedTrigger.up = true;
        else if (row === 2) expectedTrigger.down = true;
        else if (col === 0) expectedTrigger.right = true;
        else if (col === 2) expectedTrigger.left = true;
      }
      
      for (const dir of dirs) {
        // Each swipe starts from fresh cube
        window.resetCube();
        window.snapToFace(face);
        await new Promise(r => setTimeout(r, 15));
        
        const freshAgain = window.getStickerPositions().filter(s => s.face === face);
        const freshSt2 = freshAgain.find(s => s.row === row && s.col === col);
        if (!freshSt2) continue;
        const sc2 = window.worldToScreen(...freshSt2.worldPos);
        
        const stateBefore = window.getCubeState();
        window.simulateSwipe(sc2.x, sc2.y, sc2.x + dir.dx * 80, sc2.y + dir.dy * 80);
        
        const stateAfter = window.getCubeState();
        const changed = JSON.stringify(stateBefore) !== JSON.stringify(stateAfter);
        
        // Determine which face/slice was actually turned
        let matchName = 'none';
        if (changed) {
          const diff = [];
          for (let i = 0; i < stateBefore.length; i++) {
            if (stateBefore[i] !== stateAfter[i]) diff.push(i);
          }
          const diffKey = JSON.stringify(diff.sort((a,b) => a-b));
          for (const [k, v] of Object.entries(refs)) {
            if (v === diffKey) { matchName = k; break; }
          }
        }
        
        const label = `${face}(${row},${col}) ${dir.name}`;
        if (changed && expectedTrigger[dir.name] && matchName !== 'none') {
          results.pass.push(`${label} → ${matchName}`);
        } else if (changed && expectedTrigger[dir.name]) {
          results.fail.push(`${label} → unknown (expected trigger)`);
        } else if (!changed && expectedTrigger[dir.name]) {
          results.fail.push(`${label} → no trigger (expected)`);
        } else if (changed && !expectedTrigger[dir.name]) {
          results.fail.push(`${label} → false trigger: ${matchName}`);
        } else {
          // Expected no-trigger and no trigger happened — correct (silent pass)
        }
      }
    }
    
    // Test center tap
    window.resetCube();
    window.snapToFace(face);
    await new Promise(r => setTimeout(r, 15));
    const centerStickers = window.getStickerPositions().filter(s => s.face === face && s.row === 1 && s.col === 1);
    if (centerStickers.length === 0) continue;
    const centerSc = window.worldToScreen(...centerStickers[0].worldPos);
    
    // Single tap
    const cb = window.getCubeState();
    el.dispatchEvent(new PointerEvent('pointerdown', {
      clientX: centerSc.x, clientY: centerSc.y, bubbles: true, cancelable: true
    }));
    el.dispatchEvent(new PointerEvent('pointerup', {
      clientX: centerSc.x, clientY: centerSc.y, bubbles: true, cancelable: true
    }));
    await new Promise(r => setTimeout(r, 350));
    const ca = window.getCubeState();
    if (JSON.stringify(cb) !== JSON.stringify(ca)) {
      results.pass.push(`${face} center tap (CW)`);
    } else {
      results.fail.push(`${face} center tap (CW)`);
    }
  }
  
  return {
    pass: results.pass.sort(),
    fail: results.fail.sort(),
    passCount: results.pass.length,
    failCount: results.fail.length,
    total: results.pass.length + results.fail.length
  };
};

// ==================== 2D NET VIEW ====================

let viewMode = '3d'; // '3d' | '2d'

const FACE_LETTERS = ['U', 'D', 'F', 'B', 'L', 'R'];
const FACE_COLORS_HEX = ['#F5F5F5', '#FFEB3B', '#4CAF50', '#2196F3', '#FF9800', '#F44336'];

// Face layout: cross net
// Row -1: [B top]
// Row  0: [U]
// Row  1: [L] [F] [R]
// Row  2: [D]
// Row  3: [B real]
// Col -1: [B left] (row 1)
// Col  3: [B right] (row 1)
const FACE_SPECS_CLASSIC = [
  { faceIdx: 0, row: 0, col: 1, mirror: false, swapRows: false }, // U
  { faceIdx: 4, row: 1, col: 0, mirror: false, swapRows: false }, // L
  { faceIdx: 2, row: 1, col: 1, mirror: false, swapRows: false }, // F
  { faceIdx: 5, row: 1, col: 2, mirror: false, swapRows: false }, // R
  { faceIdx: 1, row: 2, col: 1, mirror: false, swapRows: false }, // D
  // B cards - same face data (3), different visual mappings
  { faceIdx: 3, row: 3, col: 1, mirror: true,  swapRows: true  }, // B real (180° rot)
  { faceIdx: 3, row: -1, col: 1, mirror: true,  swapRows: true  }, // B top (180° rot)
  { faceIdx: 3, row: 1, col: -1, mirror: false, swapRows: false }, // B left
  { faceIdx: 3, row: 1, col: 3, mirror: false, swapRows: false }, // B right
];

// Focus view: only 5 visible faces (no B cards) — bigger stickers
const FACE_SPECS_FOCUS = [
  { faceIdx: 0, row: 0, col: 1, mirror: false, swapRows: false }, // U
  { faceIdx: 4, row: 1, col: 0, mirror: false, swapRows: false }, // L
  { faceIdx: 2, row: 1, col: 1, mirror: false, swapRows: false }, // F
  { faceIdx: 5, row: 1, col: 2, mirror: false, swapRows: false }, // R
  { faceIdx: 1, row: 2, col: 1, mirror: false, swapRows: false }, // D
];

let _2dFocusMode = false;

// Toggle between 3D and 2D views
function toggleView() {
  viewMode = viewMode === '3d' ? '2d' : '3d';
  const container = document.getElementById('cube-2d-container');
  const canvasContainer = document.getElementById('canvas-container');
  const faceBtns = document.getElementById('face-buttons');
  const viewBtn = document.getElementById('view-btn');

    render2DCube();
  } else {
    container.style.display = 'none';
    canvasContainer.style.display = 'block';

  }
};
window.toggleView = toggleView;

function render2DCube() {
  if (viewMode === '2d') _render2DCube();
}

function _render2DCube() {
  const container = document.getElementById('cube-2d-container');
  const rect = container.getBoundingClientRect();
  const availW = rect.width;
  const availH = rect.height;
  if (availW <= 0 || availH <= 0) return;

  const isFocus = _2dFocusMode;
  const faceSpecs = isFocus ? FACE_SPECS_FOCUS : FACE_SPECS_CLASSIC;
  const widthDivisor = isFocus ? 12 : 19.5;

  const rawSize = Math.min(availW / widthDivisor, availH / 6.5);
  const stickerSize = Math.floor(Math.min(Math.max(rawSize, 10), 96));
  if (stickerSize < 10) return;

  const gap = Math.max(2, Math.floor(stickerSize * 0.15));
  const faceMargin = Math.floor(stickerSize * 0.7);
  const borderExtra = Math.floor(stickerSize * 0.5);
  const stickerPitch = stickerSize + gap;
  const faceWidth = 2 * stickerPitch + stickerSize;
  const facePitch = faceWidth + faceMargin;

  container.innerHTML = '';
  container.style.display = 'flex';
  container.style.alignItems = 'center';
  container.style.justifyContent = 'center';

  const cx = availW / 2;
  const cy = availH / 2;

  const pos = (row, col) => ({
    x: cx + (col - 1) * facePitch,
    y: cy + (row - 1) * facePitch,
  });

  faceSpecs.forEach(spec => {
    const center = pos(spec.row, spec.col);
    _draw2DFace(container, center.x, center.y, spec, stickerSize, stickerPitch, faceWidth, borderExtra);
  });
}

function _draw2DFace(container, cx, cy, spec, stickerSize, stickerPitch, faceWidth, borderExtra) {
  const { faceIdx, mirror, swapRows } = spec;

  const faceEl = document.createElement('div');
  faceEl.style.position = 'absolute';
  faceEl.style.left = `${cx - (faceWidth + borderExtra) / 2}px`;
  faceEl.style.top = `${cy - (faceWidth + borderExtra) / 2}px`;
  faceEl.style.width = `${faceWidth + borderExtra}px`;
  faceEl.style.height = `${faceWidth + borderExtra}px`;
  faceEl.style.display = 'grid';
  faceEl.style.gridTemplateColumns = 'repeat(3, 1fr)';
  faceEl.style.gridTemplateRows = 'repeat(3, 1fr)';
  faceEl.style.placeItems = 'center';
  faceEl.style.border = `${Math.max(3, Math.floor(stickerSize * 0.15))}px solid ${FACE_COLORS_HEX[faceIdx]}`;
  const padPx = Math.max(0, Math.floor(borderExtra / 2 - Math.max(3, Math.floor(stickerSize * 0.15))));
  faceEl.style.padding = `${padPx}px`;
  faceEl.style.borderRadius = `${Math.floor(stickerSize * 0.28)}px`;
  faceEl.style.background = 'transparent';

  // Store face data for hit testing
  faceEl.dataset.faceIdx = faceIdx;
  faceEl.dataset.cx = cx;
  faceEl.dataset.cy = cy;

  // Focus mode: clickable faces
  faceEl.style.cursor = 'pointer';

  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      const drawRow = swapRows ? (2 - row) : row;
      const drawCol = mirror ? (2 - col) : col;
      const colorIdx = get(drawRow, drawCol, faceIdx);

      const sticker = document.createElement('div');
      sticker.style.width = `${stickerSize}px`;
      sticker.style.height = `${stickerSize}px`;
      sticker.style.borderRadius = `${Math.floor(stickerSize * 0.15)}px`;
      sticker.style.display = 'flex';
      sticker.style.alignItems = 'center';
      sticker.style.justifyContent = 'center';
      sticker.style.background = FACE_COLORS_HEX[colorIdx];
      sticker.style.boxShadow = 'inset 0 1px 2px rgba(255,255,255,0.2), 0 1px 2px rgba(0,0,0,0.3)';

      // Center letter
      if (row === 1 && col === 1) {
        const label = document.createElement('span');
        const isLight = faceIdx === 0 || faceIdx === 1;
        label.style.color = isLight ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.6)';
        label.style.fontSize = `${Math.floor(stickerSize * 0.44)}px`;
        label.style.fontWeight = 'bold';
        label.textContent = FACE_LETTERS[faceIdx];
        sticker.appendChild(label);
      }

      // Touch/click handler for center sticker (turn face)
      if (row === 1 && col === 1) {
        sticker.style.cursor = 'pointer';
        sticker.addEventListener('click', (function(fi, isDbl) {
          return function() {
            // Check for double tap
            const now = Date.now();
            if (now - (_draw2DFace._lastTap || 0) < 400) {
              // Double tap = CCW
              turnFace(FACE_LETTERS[fi], 1);
              _draw2DFace._lastTap = 0;
            } else {
              _draw2DFace._lastTap = now;
              // Wait to see if double tap comes
              setTimeout(() => {
                if (_draw2DFace._lastTap !== 0) {
                  turnFace(FACE_LETTERS[fi], 0);
                  _draw2DFace._lastTap = 0;
                }
              }, 420);
            }
          };
        })(faceIdx));
      }

      faceEl.appendChild(sticker);
    }
  }

  container.appendChild(faceEl);

  // Touch handlers for the whole face (swipe to adjacent face)
  let touchStartX2 = null, touchStartY2 = null;
  faceEl.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    touchStartX2 = t.clientX;
    touchStartY2 = t.clientY;
  }, { passive: true });
  faceEl.addEventListener('touchend', (e) => {
    if (touchStartX2 === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX2;
    const dy = t.clientY - touchStartY2;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist >= 10) {
      _handle2DSwipe(faceIdx, dx, dy);
    }
    touchStartX2 = null;
    touchStartY2 = null;
  }, { passive: true });
}

// Adjacency for 2D cross net layout (same as 2D app)
const ADJACENT_2D = {
  2: { row0: 0, row2: 1, col0: 4, col2: 5 },  // F center
  0: { row0: 3, row2: 2, col0: 4, col2: 5 },  // U
  1: { row0: 2, row2: 3, col0: 4, col2: 5 },  // D
  4: { row0: 0, row2: 1, col0: 3, col2: 2 },  // L
  5: { row0: 0, row2: 1, col0: 2, col2: 3 },  // R
  3: {},  // B — no swipes, only tap
};

const SWIPE_CW_DIR_2D = {
  2: { row0: 'left', row2: 'right', col0: 'down', col2: 'up' },
  0: { row0: 'left', row2: 'right', col0: 'down', col2: 'up' },
  1: { row0: 'left', row2: 'right', col0: 'down', col2: 'up' },
  4: { row0: 'left', row2: 'right', col0: 'down', col2: 'up' },
  5: { row0: 'left', row2: 'right', col0: 'down', col2: 'up' },
  3: {},
};

let _2dSwipeStart = { face: null, x: null, y: null };

function _handle2DSwipe(startFace, dx, dy) {
  if (startFace === 3) return; // B face — no swipes
  const adj = ADJACENT_2D[startFace];
  if (!adj) return;

  const isHorizontal = Math.abs(dx) >= Math.abs(dy);
  const swipeDir = isHorizontal ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');

  let edgeKey = null;
  if (isHorizontal) {
    edgeKey = dy > 0 ? 'row2' : 'row0';
  } else {
    edgeKey = dx > 0 ? 'col2' : 'col0';
  }

  const targetFaceIdx = adj[edgeKey];
  if (targetFaceIdx === undefined || targetFaceIdx === null) return;

  const isCcw = swipeDir !== (SWIPE_CW_DIR_2D[startFace]?.[edgeKey] || 'right');
  const move = FACE_LETTERS[targetFaceIdx];

  turnFace(move, isCcw ? 1 : 0);
}

// ==================== TEST SWIPE (programmatic, no DOM) ====================
// Tests what action a swipe from a specific cell would trigger.
// Must exactly mirror the pointerup handler logic above.
window.testSwipe = function testSwipe(faceIdx, row, col, dx, dy) {
  const adj = edgeAdjacency[faceIdx];
  if (!adj) return { error: 'no adjacency', faceIdx, row, col };
  let edgeEntry = null;
  let edgeName = null;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  const isCorner = (row === 0 || row === 2) && (col === 0 || col === 2);
  const isHoriz = absDx > absDy;
  const dirLabel = isHoriz ? (dx > 0 ? 'RIGHT' : 'LEFT') : (dy > 0 ? 'DOWN' : 'UP');
  
  // MID-ROW (1,0) or (1,2)
  if (row === 1 && col !== 1) {
    if (isHoriz) {
      if (col === 0) {
        if (dx > 0) { edgeEntry = adj.midLeft; edgeName = 'midLeft'; }
        else { edgeEntry = adj.left; edgeName = 'left'; }
      } else {
        if (dx < 0) { edgeEntry = adj.midRight; edgeName = 'midRight'; }
        else { edgeEntry = adj.right; edgeName = 'right'; }
      }
    } else {
      return { faceIdx, row, col, dx, dy, dir: dirLabel, action: 'CONSUMED (cross-axis)' };
    }
  }
  // MID-COL (0,1) or (2,1)
  else if (col === 1 && row !== 1) {
    if (!isHoriz) {
      if (row === 0) {
        if (dy > 0) { edgeEntry = adj.midTop; edgeName = 'midTop'; }
        else { edgeEntry = adj.top; edgeName = 'top'; }
      } else {
        if (dy < 0) { edgeEntry = adj.midBottom; edgeName = 'midBottom'; }
        else { edgeEntry = adj.bottom; edgeName = 'bottom'; }
      }
    } else {
      return { faceIdx, row, col, dx, dy, dir: dirLabel, action: 'CONSUMED (cross-axis)' };
    }
  }
  // CORNER
  else if (isCorner) {
    if (isHoriz) {
      edgeName = row === 0 ? 'top' : 'bottom';
    } else {
      edgeName = col === 0 ? 'left' : 'right';
    }
    edgeEntry = adj[edgeName];
  }
  
  if (!edgeEntry) return { faceIdx, row, col, dx, dy, dir: dirLabel, action: 'NONE' };
  if (edgeEntry.consumed) return { faceIdx, row, col, dx, dy, dir: dirLabel, action: 'CONSUMED' };
  
  const adjFace = edgeEntry.face;
  if (edgeEntry.isSlice) {
    const sliceInv = edgeEntry.invert ? 1 : 0;
    let prime = 0;
    let label = '';
    if (edgeEntry.dir === 'right') { prime = 1 ^ sliceInv; label = adjFace + (prime ? ' CCW' : ' CW'); }
    else if (edgeEntry.dir === 'left') { prime = 0 ^ sliceInv; label = adjFace + (prime ? ' CCW' : ' CW'); }
    else if (edgeEntry.dir === 'down') { prime = 0 ^ sliceInv; label = adjFace + (prime ? ' CCW' : ' CW'); }
    else if (edgeEntry.dir === 'up') { prime = 1 ^ sliceInv; label = adjFace + (prime ? ' CCW' : ' CW'); }
    return { faceIdx, row, col, dx, dy, dir: dirLabel, edgeName, adjFace, isSlice: true, prime, action: 'SLICE ' + label };
  } else {
    const inv = edgeEntry.invert ? 1 : 0;
    let prime = 0;
    if (edgeName === 'top') {
      prime = isHoriz ? (dx > 0 ? (inv ? 0 : 1) : (inv ? 1 : 0)) : (dy > 0 ? (inv ? 1 : 0) : (inv ? 0 : 1));
    } else if (edgeName === 'bottom') {
      prime = isHoriz ? (dx > 0 ? (inv ? 1 : 0) : (inv ? 0 : 1)) : (dy > 0 ? (inv ? 0 : 1) : (inv ? 1 : 0));
    } else if (edgeName === 'left') {
      prime = dy > 0 ? (inv ? 1 : 0) : (inv ? 0 : 1);
    } else { // 'right'
      prime = dy > 0 ? (inv ? 0 : 1) : (inv ? 1 : 0);
    }
    return { faceIdx, row, col, dx, dy, dir: dirLabel, edgeName, adjFace, isSlice: false, prime, action: 'TURN ' + adjFace + (prime ? ' CCW' : ' CW') };
  }
};

// ==================== SMOKE TEST ====================
// Tests all 6 faces × 9 cells × 4 directions = 216 cases
// For each case, reports what action the swipe would trigger.
// Returns { byFace, summary } with PASS/FAIL per face.
window.runSmokeTest = function runSmokeTest() {
  const names = ['U','D','F','B','L','R'];
  const dirs = [
    [0, 50, 'DOWN'], [0, -50, 'UP'], [50, 0, 'RIGHT'], [-50, 0, 'LEFT']
  ];
  
  const result = {};
  let totalPass = 0, totalFail = 0, totalConsumed = 0;
  
  for (let fi = 0; fi < 6; fi++) {
    const adj = edgeAdjacency[fi];
    if (!adj) continue;
    
    const faceResults = [];
    let pass = 0, fail = 0, consumed = 0;
    
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        if (row === 1 && col === 1) continue; // center sticker = tap only
        
        for (const [dx, dy, dir] of dirs) {
          const r = window.testSwipe(fi, row, col, dx, dy);
          r.faceName = names[fi];
          r.testCell = `${names[fi]}(${row},${col}) ${dir}`;
          
          if (r.action.startsWith('CONSUMED')) {
            consumed++;
          } else {
            pass++;
          }
          faceResults.push(r);
        }
      }
    }
    
    result[names[fi]] = { results: faceResults, pass, fail, consumed, total: faceResults.length };
    totalPass += pass;
    totalFail += fail;
    totalConsumed += consumed;
  }
  
  result._summary = {
    total: totalPass + totalFail + totalConsumed,
    pass: totalPass,
    fail: totalFail,
    consumed: totalConsumed
  };
  
  return result;
};

// Run smoke test and print formatted report to console
window.printSmokeReport = function printSmokeReport() {
  const data = window.runSmokeTest();
  const report = [];
  report.push('===== CUBE BUDDY SMOKE TEST =====');
  report.push('');
  
  for (const face of ['U','D','F','B','L','R']) {
    const f = data[face];
    const nonConsumed = f.results.filter(r => !r.action.startsWith('CONSUMED'));
    report.push(`--- ${face} (${nonConsumed.length} non-consumed, ${f.consumed} consumed) ---`);
    report.push('Cell       Dir    Action');
    report.push('--------- ------ -------------------------------------');
    
    for (const r of f.results) {
      const cell = `${r.faceName}${r.cell}`;
      report.push(`${cell.padEnd(9)} ${r.dir.padEnd(6)} ${r.action}`);
    }
    report.push('');
  }
  
  report.push('===== SUMMARY =====');
  report.push(`Total: ${data._summary.total}`);
  report.push(`Pass (non-consumed): ${data._summary.pass}`);
  report.push(`Consumed: ${data._summary.consumed}`);
  report.push(`Fail: ${data._summary.fail}`);
  
  console.log(report.join('\n'));
  return data;
};

// ==================== ADJACENT FACE VERIFIER ====================
// Pure-logic turn verifier that shows before/after 3×3 color grids
// for all 6 faces after applying a move to the solved cube.
// This bridges the gap between pure swipe-logic tests and visual bugs.
//
// Usage: window.verifyAdjacentFaces('F')    // F CW
//        window.verifyAdjacentFaces("F'")   // F CCW  
//        window.verifyAdjacentFaces('F', 2)  // F twice
//        window.verifyAdjacentFaces()        // Run all 12 standard moves
//
// The color grid uses letters: W(hite) Y(ellow) G(reen) B(lue) O(range) R(ed)
//
// NOTE: On a solved cube (all faces uniform color), a face self-rotation shows
// 0 visual changes on the turned face itself — only the 4 adjacent faces show
// 3 changes each (= 12 total). This is CORRECT behavior. The turned face's 9
// stickers permute internally but all share the same color value.
window.verifyAdjacentFaces = function(move, repeat) {
  const names = ['U','D','F','B','L','R'];
  const colors = ['W','Y','G','B','O','R'];
  const colorNames = ['White','Yellow','Green','Blue','Orange','Red'];
  
  function buildRefDiff(mv, n) {
    const identity = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
    window.setCubeState([...identity]);
    for (let i = 0; i < n; i++) window.doMove(mv);
    const after = window.getCubeState();
    
    const diffs = [];
    for (let i = 0; i < identity.length; i++) {
      if (identity[i] !== after[i]) {
        const f = Math.floor(i / 9);
        const r = Math.floor((i % 9) / 3);
        const c = i % 3;
        diffs.push({
          idx: i, face: names[f], row: r, col: c,
          oldColor: colors[identity[i]], newColor: colors[after[i]],
          oldColorName: colorNames[identity[i]], newColorName: colorNames[after[i]]
        });
      }
    }
    
    const byFace = {};
    for (const d of diffs) {
      if (!byFace[d.face]) byFace[d.face] = [];
      byFace[d.face].push(d);
    }
    
    function renderFace(f, caption, stateArr) {
      const lines = [];
      lines.push(`╔═══════════╗   ${caption}`);
      for (let r = 0; r < 3; r++) {
        let row = '║';
        for (let c = 0; c < 3; c++) row += ` ${colors[stateArr[f*9 + r*3 + c]]} `;
        row += '║';
        if (r === 0) row += '  row 0';
        else if (r === 1) row += '  row 1';
        else row += '  row 2';
        lines.push(row);
      }
      lines.push(`╚═══════════╝`);
      return lines;
    }
    
    const lines = [];
    lines.push('');
    lines.push(`===== ADJACENT FACE VERIFY: ${mv}${n > 1 ? '×' + n : ''} =====`);
    lines.push('');
    
    // On solved cube: turned face self-rotates (9 stickers permute) but all same color
    // So only adjacent faces show changes. Expected: exactly 12 changes (4 faces × 3 stickers)
    // Across 4 faces
    const changedFaces = Object.keys(byFace);
    lines.push(`Total ${diffs.length} stickers changed across ${changedFaces.length} faces:`);
    for (const face of names) {
      const fd = byFace[face];
      if (!fd) continue;
      const n9 = fd.length;
      let label;
      if (n9 === 9) label = 'TURNED (self-rotation — invisible on solved cube)';
      else if (n9 === 3) label = 'ADJACENT (edge stickers borrowed)';
      else label = '???';
      lines.push(`  ${face}: ${n9} stickers changed [${label}]`);
    }
    lines.push('');
    
    // Determine which face was turned (= which face's center moved to adjacent face? No.
    // We can figure it out: the turned face is the one that appears 3× on adjacent faces)
    // Or more simply: F CW borrows from U-row0, D-row0, L-col2, R-col2
    // Let's identify the turned face from the move string
    const turnedFaceName = mv.replace(/'/g, '');
    const turnedFaceIdx = names.indexOf(turnedFaceName);
    
    if (turnedFaceIdx >= 0) {
      const idState = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
      lines.push('');
      lines.push(`─ The turned face (${turnedFaceName} — self-rotation, all same color on solved cube):`);
      lines.push(...renderFace(turnedFaceIdx, `SOLVED (before/after identical color)`, idState));
      lines.push(`   (9 stickers permuted, but all ${colorNames[idState[turnedFaceIdx*9+4]]} — visually unchanged)`);
      lines.push('');
    }
    
    // Adjacent faces
    const adjCount = changedFaces.filter(f => byFace[f].length === 3).length;
    if (adjCount > 0) {
      lines.push('');
      lines.push(`─ Adjacent faces (${adjCount} faces × 3 edge stickers borrowed):`);
      lines.push('');
      const idState = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
      for (const af of changedFaces) {
        if (byFace[af].length !== 3) continue;
        const ai = names.indexOf(af);
        lines.push(...renderFace(ai, `ADJACENT ${af}`, after));
        lines.push(`   Changed cells (edge stickers that moved in):`);
        for (const d of byFace[af]) {
          lines.push(`     ${af}(${d.row},${d.col}): ${d.oldColor} → ${d.newColor}  (${d.oldColorName} → ${d.newColorName})`);
        }
        lines.push('');
      }
    }
    
    // Opposite face check
    if (turnedFaceIdx >= 0) {
      const oppMap = [1, 0, 3, 2, 5, 4];
      const oppF = names[oppMap[turnedFaceIdx]];
      const oppD = byFace[oppF] || [];
      lines.push(`─ Opposite face (${oppF}): ${oppD.length === 0 ? '✅ UNCHANGED (correct)' : '⚠ CHANGED (' + oppD.length + ' stickers) — BUG!'}`);
      
      lines.push('');
      lines.push(`SUMMARY: ${diffs.length} total changes across ${changedFaces.length} faces`);
      lines.push(`  Turned: ${turnedFaceName} | Adjacent: ${adjCount} faces | Opposite: ${oppF} (unchanged ✅)`);
      lines.push('');
    }
    
    console.log(lines.join('\n'));
    return { diffs, byFace, turnedFaceName, adjCount, totalChanges: diffs.length };
  }
  
  if (!move) {
    // Run all 12 standard moves on solved cube (best for verification)
    console.log('===== VERIFY ALL 12 MOVES (on solved cube) =====');
    console.log('On solved cube, a face turn shows:');
    console.log('  - 12 changes (4 adjacent faces × 3 edge stickers)');
    console.log('  - 0 changes on turned face (all same color)');
    console.log('  - 0 changes on opposite face\n');
    
    const identity = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
    const allMoves = ['U',"U'",'D',"D'",'F',"F'",'B',"B'",'L',"L'",'R',"R'"];
    let allPass = true;
    for (const mv of allMoves) {
      window.setCubeState([...identity]);
      window.doMove(mv);
      const after = window.getCubeState();
      const diffs = [];
      for (let i = 0; i < identity.length; i++) {
        if (identity[i] !== after[i]) diffs.push(i);
      }
      const byFaceCount = {};
      for (const i of diffs) {
        const f = names[Math.floor(i/9)];
        byFaceCount[f] = (byFaceCount[f] || 0) + 1;
      }
      // Expected: turned face (0 changes on solved), 4 adjacent faces (3 each), opposite face (0)
      const counts = Object.values(byFaceCount).sort((a,b) => a-b);
      const turned = mv.replace(/'/g, '');
      const oppMap = [1, 0, 3, 2, 5, 4];
      const oppF = names[oppMap[names.indexOf(turned)]];
      
      let adjFaces = Object.keys(byFaceCount).filter(f => byFaceCount[f] === 3);
      const hasAll4Adj = adjFaces.length === 4;
      const oppositeClean = !byFaceCount[oppF];
      const noSelfChanges = !byFaceCount[turned];
      
      if (hasAll4Adj && oppositeClean && noSelfChanges) {
        console.log(`  ${mv}: ✅ ${turned} → adjacents: ${adjFaces.join(',')} (3 each) | opposite ${oppF}: 0 | self ${turned}: 0`);
      } else {
        allPass = false;
        console.log(`  ${mv}: ⚠ ` + (!noSelfChanges ? `self ${turned} changed (${byFaceCount[turned]})` : '') +
          (!hasAll4Adj ? ` expected 4 adjacents, got ${adjFaces.length}` : '') +
          (!oppositeClean ? ` opposite ${oppF} changed (${byFaceCount[oppF]})` : ''));
        for (const [face, n] of Object.entries(byFaceCount).sort((a,b) => b[1]-a[1])) {
          console.log(`    ${face}: ${n} changes`);
        }
      }
    }
    window.setCubeState([...identity]);
    console.log(allPass ? '\n✅ All 12 standard moves PASS! Adjacent face swap-arounds are correct.' : '\n⚠ Some moves have issues.');
    return;
  }
  
  return buildRefDiff(move, repeat || 1);
};

// ==================== ADJACENT FACE POSITION SMOKE CHECK ====================
// Verifies that each move changes the *correct rows/columns* on adjacent faces,
// not just the right *number* of changes. This catches row/col mapping bugs
// that the count-only verifyAdjacentFaces() could miss.
//
// Usage: window.verifyAdjacentPositions()     // Run all 12 moves
//        window.verifyAdjacentPositions('F')   // Single move
//
// How it works: On a solved cube, each move changes 12 adjacent-face stickers.
// This test checks exactly which state indices changed and validates they
// correspond to the correct (face, row, col) positions based on known formulas.
window.verifyAdjacentPositions = function(move) {
  const names = ['U','D','F','B','L','R'];
  const colors = ['W','Y','G','B','O','R'];
  
  // For each move, the 12 expected state indices on adjacent faces
  // (4 adjacent faces × 3 stickers each)
  const moveDiffIndices = {
    'U':  { adj: [[45,46,47], [18,19,20], [36,37,38], [27,28,29]], face: 'U' },
    "U'": { adj: [[45,46,47], [18,19,20], [36,37,38], [27,28,29]], face: 'U' },
    'D':  { adj: [[51,52,53], [33,34,35], [42,43,44], [24,25,26]], face: 'D' },
    "D'": { adj: [[51,52,53], [33,34,35], [42,43,44], [24,25,26]], face: 'D' },
    'F':  { adj: [[45,48,51], [9,10,11], [38,41,44], [6,7,8]],     face: 'F' },
    "F'": { adj: [[45,48,51], [9,10,11], [38,41,44], [6,7,8]],     face: 'F' },
    'B':  { adj: [[42,39,36], [17,16,15], [53,50,47], [2,1,0]],    face: 'B' },
    "B'": { adj: [[42,39,36], [17,16,15], [53,50,47], [2,1,0]],    face: 'B' },
    'L':  { adj: [[18,21,24], [9,12,15], [35,32,29], [0,3,6]],     face: 'L' },
    "L'": { adj: [[18,21,24], [9,12,15], [35,32,29], [0,3,6]],     face: 'L' },
    'R':  { adj: [[2,5,8], [33,30,27], [11,14,17], [20,23,26]],    face: 'R' },
    "R'": { adj: [[2,5,8], [33,30,27], [11,14,17], [20,23,26]],    face: 'R' },
  };
  
  // Map state index → (face, row, col) for readable output
  function idxInfo(idx) {
    const f = Math.floor(idx / 9);
    const r = Math.floor((idx % 9) / 3);
    const c = idx % 3;
    return { face: names[f], row: r, col: c };
  }
  
  function runCheck(mv) {
    const info = moveDiffIndices[mv];
    if (!info) return { pass: false, error: `Unknown move: ${mv}` };
    
    // All expected adjacent indices
    const expectedAdjIndices = new Set();
    for (const group of info.adj) {
      for (const idx of group) expectedAdjIndices.add(idx);
    }
    
    // Turned face indices
    const turnedIdx = names.indexOf(info.face);
    const turnedIndices = new Set();
    for (let i = 0; i < 9; i++) turnedIndices.add(turnedIdx * 9 + i);
    
    // Run the move on solved cube
    const identity = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
    window.setCubeState([...identity]);
    window.doMove(mv);
    const after = window.getCubeState();
    
    // Find which indices actually changed
    const changed = [];
    for (let i = 0; i < identity.length; i++) {
      if (identity[i] !== after[i]) changed.push(i);
    }
    
    const changedSet = new Set(changed);
    
    // Categorize changes
    const adjChanges = [];
    const turnedChanges = [];
    const unexpectedChanges = [];
    const expectedButMissing = [];
    
    for (const i of changed) {
      if (turnedIndices.has(i)) {
        turnedChanges.push(i);
      } else if (expectedAdjIndices.has(i)) {
        adjChanges.push(i);
      } else {
        unexpectedChanges.push(i);
      }
    }
    
    for (const i of expectedAdjIndices) {
      if (!changedSet.has(i)) expectedButMissing.push(i);
    }
    
    // Build report
    const lines = [];
    lines.push(`\n===== POSITION CHECK: ${mv} =====`);
    lines.push(`Changed: ${changed.length} total (${adjChanges.length} adj + ${turnedChanges.length} turned)`);
    
    if (unexpectedChanges.length > 0) {
      lines.push(`\n⚠ UNEXPECTED changes:`);
      for (const i of unexpectedChanges) {
        const {face, row, col} = idxInfo(i);
        lines.push(`  ${face}(${row},${col}) [idx=${i}]: ${colors[identity[i]]} → ${colors[after[i]]}`);
      }
    }
    
    if (expectedButMissing.length > 0) {
      lines.push(`\n⚠ MISSING expected changes:`);
      for (const i of expectedButMissing) {
        const {face, row, col} = idxInfo(i);
        lines.push(`  ${face}(${row},${col}) [idx=${i}] should have changed but didn't`);
      }
    }
    
    // Show adjacent changes grouped by face
    if (adjChanges.length > 0) {
      lines.push(`\nAdjacent face changes (by face):`);
      const byFace = {};
      for (const i of adjChanges) {
        const {face, row, col} = idxInfo(i);
        if (!byFace[face]) byFace[face] = [];
        byFace[face].push({idx: i, row, col});
      }
      for (const [face, entries] of Object.entries(byFace)) {
        const rows = [...new Set(entries.map(e => e.row))];
        const cols = [...new Set(entries.map(e => e.col))];
        const pattern = rows.length === 1 ? `row ${rows[0]}` : (cols.length === 1 ? `col ${cols[0]}` : 'mixed');
        lines.push(`  ${face}: 3 changes on ${pattern}`);
        for (const e of entries) {
          lines.push(`    ${face}(${e.row},${e.col}) [idx=${e.idx}]`);
        }
      }
    }
    
    const pass = unexpectedChanges.length === 0 && expectedButMissing.length === 0 && adjChanges.length === 12;
    lines.push(`\nResult: ${pass ? '✅ PASS' : '⚠ FAIL'}`);
    
    console.log(lines.join('\n'));
    return { pass, mv, adjChanges: adjChanges.length, unexpectedChanges, expectedButMissing };
  }
  
  if (!move) {
    // Run all 12 moves
    const identity = new Array(54).fill(0).map((_,i) => Math.floor(i/9));
    const allMoves = ['U',"U'",'D',"D'",'F',"F'",'B',"B'",'L',"L'",'R',"R'"];
    let allPass = true;
    const results = [];
    
    console.log('\n===== ADJACENT FACE POSITION SMOKE CHECK =====');
    console.log('Verifying each move changes the CORRECT rows/cols on adjacent faces\n');
    
    for (const mv of allMoves) {
      const result = runCheck(mv);
      results.push(result);
      if (!result.pass) allPass = false;
    }
    
    window.setCubeState([...identity]);
    console.log(`\n===== POSITION CHECK SUMMARY =====`);
    console.log(`All 12 moves: ${allPass ? '✅ ALL PASS' : '⚠ SOME FAILED'}`);
    for (const r of results) {
      console.log(`  ${r.mv}: ${r.pass ? '✅' : '⚠'} ${r.adjChanges}/12 adj positions`);
    }
    return { allPass, results };
  }
  
  return runCheck(move);
};

updateButtonSnapTargets();
animate();
</script>
